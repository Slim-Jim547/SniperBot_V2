<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SniperBot V2 Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body   { font-family: monospace; background: #0d1117; color: #c9d1d9;
             margin: 0; padding: 1rem 1.5rem; }
    h1     { color: #58a6ff; margin: 0 0 1rem; }
    .grid  { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
             gap: 1rem; margin-bottom: 1.5rem; }
    .card  { background: #161b22; border: 1px solid #30363d;
             border-radius: 6px; padding: 1rem; }
    .card h2  { margin: 0 0 0.75rem; font-size: 0.78rem; text-transform: uppercase;
                color: #8b949e; letter-spacing: 1px; }
    .lbl   { color: #8b949e; font-size: 0.78rem; margin-top: 0.5rem; }
    .val   { font-size: 1rem; }
    .state-IDLE     { color: #8b949e; }
    .state-WATCHING { color: #f0c040; }
    .state-IN_TRADE { color: #3fb950; }
    .state-CLOSING  { color: #e3b341; }
    .state-UNKNOWN  { color: #8b949e; }
    .pnl-pos { color: #3fb950; }
    .pnl-neg { color: #f85149; }
    .none    { color: #8b949e; font-style: italic; }
    table  { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th     { text-align: left; padding: 0.35rem 0.5rem; color: #8b949e;
             border-bottom: 1px solid #30363d; }
    td     { padding: 0.35rem 0.5rem; border-bottom: 1px solid #21262d; }
    #footer { color: #8b949e; font-size: 0.72rem; margin-top: 1rem; }
  </style>
</head>
<body>
  <h1>SniperBot V2</h1>

  <div class="grid">
    <!-- Bot Status -->
    <div class="card">
      <h2>Bot Status</h2>
      <div class="lbl">State</div>
      <div class="val" id="bot-state">—</div>
      <div class="lbl">Balance</div>
      <div class="val" id="bot-balance">—</div>
      <div class="lbl">Regime</div>
      <div class="val" id="bot-regime">—</div>
      <div class="lbl">Last Close</div>
      <div class="val" id="bot-last-close">—</div>
    </div>

    <!-- Open Position -->
    <div class="card">
      <h2>Open Position</h2>
      <div id="position-body"><span class="none">No open position</span></div>
    </div>

    <!-- Today's Summary -->
    <div class="card">
      <h2>Today's Summary</h2>
      <div class="lbl">Trades</div>
      <div class="val" id="today-trades">—</div>
      <div class="lbl">Wins / Losses</div>
      <div class="val" id="today-wl">—</div>
      <div class="lbl">Net PnL</div>
      <div class="val" id="today-pnl">—</div>
    </div>
  </div>

  <!-- Recent Trades -->
  <div class="card">
    <h2>Recent Trades (last 20)</h2>
    <table>
      <thead>
        <tr>
          <th>Closed (UTC)</th>
          <th>Symbol</th>
          <th>Strategy</th>
          <th>Regime</th>
          <th>Entry</th>
          <th>Exit</th>
          <th>PnL</th>
        </tr>
      </thead>
      <tbody id="trades-body"></tbody>
    </table>
  </div>

  <div id="footer">Last updated: —</div>

  <script>
    const REFRESH_MS = {{ refresh_seconds }} * 1000;

    function fmtTs(ts) {
      if (!ts) return '—';
      // "Mon, 30 Mar 2026 14:32:00 GMT" → "30 Mar 14:32"
      const s = new Date(ts * 1000).toUTCString();
      return s.slice(5, 7) + ' ' + s.slice(8, 11) + ' ' + s.slice(17, 22);
    }

    function fmtPnl(v) {
      if (v === null || v === undefined) return '—';
      const cls  = v >= 0 ? 'pnl-pos' : 'pnl-neg';
      const sign = v >= 0 ? '+' : '';
      return `<span class="${cls}">${sign}$${v.toFixed(2)}</span>`;
    }

    function applyStatus(data) {
      const bot = data.bot;

      const stateEl = document.getElementById('bot-state');
      stateEl.textContent  = bot.state;
      stateEl.className    = `val state-${bot.state}`;

      document.getElementById('bot-balance').textContent =
        bot.balance ? `$${bot.balance.toFixed(2)}` : '—';
      document.getElementById('bot-regime').textContent    = bot.regime   || '—';
      document.getElementById('bot-last-close').textContent =
        bot.last_close ? `$${bot.last_close.toFixed(4)}` : '—';

      const posEl = document.getElementById('position-body');
      const p = data.open_position;
      if (p) {
        posEl.innerHTML = `
          <div class="lbl">Symbol</div>      <div class="val">${p.symbol}</div>
          <div class="lbl">Strategy / Regime</div>
          <div class="val">${p.strategy} / ${p.regime}</div>
          <div class="lbl">Entry Price</div>  <div class="val">$${p.entry_price.toFixed(4)}</div>
          <div class="lbl">Size</div>          <div class="val">${p.size.toFixed(4)}</div>
          <div class="lbl">Unrealized PnL</div>
          <div class="val">${fmtPnl(p.unrealized_pnl)}</div>
          <div class="lbl">Opened</div>       <div class="val">${fmtTs(p.entry_time)}</div>
        `;
      } else {
        posEl.innerHTML = '<span class="none">No open position</span>';
      }

      const t = data.today;
      document.getElementById('today-trades').textContent = t.total_trades;
      document.getElementById('today-wl').textContent     = `${t.wins}W / ${t.losses}L`;
      document.getElementById('today-pnl').innerHTML      = fmtPnl(t.total_pnl);
    }

    function applyTrades(trades) {
      const tbody = document.getElementById('trades-body');
      if (!trades.length) {
        tbody.innerHTML =
          '<tr><td colspan="7" class="none">No closed trades yet</td></tr>';
        return;
      }
      tbody.innerHTML = trades.map(t => `
        <tr>
          <td>${fmtTs(t.exit_time)}</td>
          <td>${t.symbol}</td>
          <td>${t.strategy}</td>
          <td>${t.regime}</td>
          <td>$${t.entry_price.toFixed(4)}</td>
          <td>${t.exit_price != null ? '$' + t.exit_price.toFixed(4) : '—'}</td>
          <td>${fmtPnl(t.pnl)}</td>
        </tr>
      `).join('');
    }

    async function refresh() {
      try {
        const [status, trades] = await Promise.all([
          fetch('/api/status').then(r => r.json()),
          fetch('/api/trades').then(r => r.json()),
        ]);
        applyStatus(status);
        applyTrades(trades);
        document.getElementById('footer').textContent =
          'Last updated: ' + new Date().toUTCString() +
          ' (auto-refresh every {{ refresh_seconds }}s)';
      } catch (err) {
        document.getElementById('footer').textContent =
          'Fetch error: ' + err.message;
      }
    }

    refresh();
    setInterval(refresh, REFRESH_MS);
  </script>
</body>
</html>
