# SniperBot V2 — Full configuration schema
# All parameters live here. Nothing is hardcoded in Python.

exchange:
  base_url: "https://api.kraken.com"
  ws_url: "wss://ws.kraken.com"
  # No credentials needed for Phases 1-5 — Kraken public endpoints require no auth

broker:
  mode: "paper"        # paper | live — change this one line to go live

paper:
  initial_balance: 500.0  # starting USD balance for paper trading

symbols:
  - "ETH/USD"         # Kraken format: slash for WebSocket, stripped to ETHUSD for REST

timeframe: "15"         # candle size in minutes (5 = 5-minute candles)

backfill:
  candle_count: 500    # how many historical candles to load on startup
  max_per_request: 720 # Kraken public OHLC API max per request

indicators:
  ema_fast: 9
  ema_slow: 21
  ema_trend: 50
  rsi_period: 14
  bb_period: 20
  bb_std: 2.0
  atr_period: 14
  adx_period: 14
  volume_ma_period: 20
  mtf_timeframe: "30"  # multi-timeframe in minutes (1h)

regime:
  adx_trending_threshold: 25    # ADX above this → TRENDING
  adx_breakout_threshold: 30    # ADX above this + BB wide → BREAKOUT
  bb_squeeze_threshold: 0.02    # BB width % below this → squeeze
  volume_surge_ratio: 1.5       # volume / volume_ma above this → surge

strategies:
  confirmation_candles: 3          # candles to confirm an entry signal (WATCHING timeout)
  momentum:
    bb_squeeze_periods: 5           # candles BB must be squeezed before breakout
    breakout_atr_multiplier: 0.5    # price must move this many ATRs from BB mid
  trend_follow:
    ema_alignment_required: true    # fast > slow > trend required
    adx_min: 25                     # minimum ADX for entry
    rsi_overbought: 70              # RSI at or above this → skip entry

risk:
  mode: "notional"             # risk_pct | notional
  risk_per_trade_pct: 1.0      # % of account to risk per trade
  notional_size: 50.0         # fixed USD size if mode = notional
  max_position_pct: 10.0       # max % of account in a single position
  daily_loss_limit_pct: 3.0    # halt trading after this daily drawdown %
  max_trades_per_day: 40       # circuit breaker: max trades in one day
  cooldown_minutes: 5         # cooldown after a loss before next trade
  atr_stop_multiplier: 2.0     # trailing stop = close - multiplier * ATR

database:
  path: "data/sniperbot.db"
  backtest_path: "data/backtest.db"

alerts:
  # credentials are in secrets/secrets.yaml

dashboard:
  port: 5000
  refresh_seconds: 30

logging:
  level: "INFO"
  file: "logs/bot.log"

# Phase 4 — Backtest Engine
backtest:
  candle_count: 2000            # total candles to fetch (warm-up + replay)
  data_path: "data/historical"      # local CSV cache directory
  initial_capital: 10000.0          # starting portfolio value in USD
  maker_fee: 0.0016                 # Kraken maker fee (0.16%)
  taker_fee: 0.0026                 # Kraken taker fee (0.26%)
  slippage_pct: 0.001               # 0.1% slippage model
